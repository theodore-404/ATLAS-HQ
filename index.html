<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script
    src="https://cdn.tailwindcss.com"></script>
    <title>ATLAS HQ</title>
</head>

<body class="bg-black text-green-500 font-mono">

    <div class="max-w-5x1 mx-auto p-6">
        <h1 class="text-4x1 font-bold">ATLAS HQ</h1>
        <p class="text-green-400 mb-8">Personal Tactical Operating System</p>
        <div
        id="briefing"
        class="border border-green-500 p-4 mb-6">Loading...</div>
        <div
        id="threats"
        class="border border-yellow-500 text-yellow-400 p-4 mb-6">No threats detected</div>
        <div class="border border-cyan-500 p-4 mb-6">
    <h2 class="mb-4">RESOURCE MANAGEMENT</h2>
<div class="grid md:grid-cols-2 gap-3">
    <input
    id="moneyInput"
    type="number"
    placeholder="Money"
    class="bg-black border border-cyan-500 p-2">
    <input
    id="energyInput"
    type="number"
    placeholder="Energy %"
    class="bg-black border border-cyan-500 p-2">
    <input
    id="focusInput"
    type="number"
    placeholder="Focus %"
    class="bg-black border border-cyan-500 p-2">
    <input
    id="timeInput"
    type="number"
    placeholder="Free Time (hours)"
    class="bg-black border border-cyan-500 p-2"></div>

    <button
    id="saveResources"
    class="mt-4 border border-cyan-500 px-4 py-2">SAVE RESOURCES</button>
    <div
    id="resourceDisplay"
    class="mt-4"></div>
    </div>
        <div
        class="border border-green-500 p-4">
    <h2 class="text-xl mb-4">MISSION CONTROL</h2>
<input
id="missionInput"
type="text"
placeholder="New Mission"
class="w-full bg-black border border-green-500 p-2">
<button
id="addMission"
class="mt-3 border border-green-500 px-4 py-2">ADD MISSION</button>
<ul
id="missionList"
class="mt-4 space-y-2"></ul>
</div>
    </div>

    <script
    type="module"
    src="./js/app.js"></script>
</body>
</html>
